<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>thread-weaver — transferables demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #e4e4e7;
        background: #18181b;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }
      p.sub {
        color: #a1a1aa;
        margin-top: 0;
      }
      button {
        background: #7c3aed;
        color: #fff;
        border: none;
        padding: 0.6rem 1.6rem;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
        margin-bottom: 1rem;
      }
      button:hover {
        background: #6d28d9;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #log {
        background: #09090b;
        border: 1px solid #27272a;
        border-radius: 8px;
        padding: 1rem;
        font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", monospace;
        font-size: 0.85rem;
        line-height: 1.6;
        white-space: pre;
        overflow: auto;
        max-height: 60vh;
        color: #d4d4d8;
      }
    </style>
  </head>
  <body>
    <h1>thread-weaver — transferables</h1>
    <p class="sub">
      Compare structured clone (copy) vs. transfer (zero-copy) for large
      ArrayBuffers.
    </p>

    <button id="run">Run demo</button>

    <div id="log">Click "Run demo" to start…</div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
